# MongoDB Replica Set Helm Chart
# ==============================
#
# Production-ready 3-node MongoDB replica set with TLS, backups, and proper auth.
#
# Quick Start:
#   helm install my-mongodb ./mongodb-replicaset \
#     --namespace databases --create-namespace \
#     --set mongodb.auth.rootPassword=<your-root-password>
#
# With TLS:
#   helm install my-mongodb ./mongodb-replicaset \
#     --namespace databases --create-namespace \
#     --set mongodb.auth.rootPassword=<password> \
#     --set mongodb.tls.enabled=true
#
# External access (NodePort):
#   helm install my-mongodb ./mongodb-replicaset \
#     --namespace databases --create-namespace \
#     --set mongodb.auth.rootPassword=<password> \
#     --set mongodb.externalAccess.enabled=true \
#     --set mongodb.externalAccess.service.type=NodePort

# -----------------------------------------------------------------------------
# Global
# -----------------------------------------------------------------------------
global:
  # -- Image pull secrets for private registries
  imagePullSecrets: []

# -- Control Plane integration
controlPlane:
  # -- Labels added to all resources
  labels: {}
  # -- Annotations added to all resources
  annotations: {}

# -----------------------------------------------------------------------------
# MongoDB Subchart Configuration
# https://github.com/bitnami/charts/tree/main/bitnami/mongodb
# -----------------------------------------------------------------------------
mongodb:
  # -- Enable MongoDB deployment
  enabled: true

  # -- MongoDB architecture (replicaset for production)
  architecture: replicaset

  # -- Replica set name
  replicaSetName: rs0

  # -- Number of replica set members (primary + secondaries)
  # For production: use 3 (1 primary + 2 secondaries)
  replicaCount: 3

  # ---------------------------------------------------------------------------
  # Authentication
  # ---------------------------------------------------------------------------
  auth:
    # -- Enable authentication (always true for production)
    enabled: true
    
    # -- Root user password (REQUIRED)
    # Generate with: openssl rand -base64 24
    rootPassword: ""
    
    # -- Root username
    rootUser: root
    
    # -- Replica set key for internal auth
    # Generate with: openssl rand -base64 756
    replicaSetKey: ""
    
    # -- Use existing secret for passwords
    # Must contain keys: mongodb-root-password, mongodb-replica-set-key
    existingSecret: ""

    # -- Application database user (optional)
    # usernames: []
    # passwords: []
    # databases: []

  # ---------------------------------------------------------------------------
  # TLS / SSL
  # ---------------------------------------------------------------------------
  tls:
    # -- Enable TLS
    enabled: false
    
    # -- Auto-generate certificates (requires cert-manager)
    autoGenerated: true
    
    # -- Use existing secret with TLS certs
    # Must contain keys: mongodb-ca-cert, mongodb-ca-key
    existingSecret: ""
    
    # -- Additional TLS settings
    mTLS:
      enabled: false

  # ---------------------------------------------------------------------------
  # Resources
  # ---------------------------------------------------------------------------
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 4Gi

  # ---------------------------------------------------------------------------
  # Persistence
  # ---------------------------------------------------------------------------
  persistence:
    # -- Enable persistence
    enabled: true
    
    # -- Storage class (empty = default)
    storageClass: ""
    
    # -- Access modes
    accessModes:
      - ReadWriteOnce
    
    # -- Size per replica
    size: 20Gi
    
    # -- Annotations for the PVC
    annotations: {}

  # ---------------------------------------------------------------------------
  # Arbiter (optional, for even-numbered replica sets)
  # ---------------------------------------------------------------------------
  arbiter:
    # -- Enable arbiter (use if replicaCount is even)
    enabled: false
    
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi

  # ---------------------------------------------------------------------------
  # External Access
  # ---------------------------------------------------------------------------
  externalAccess:
    # -- Enable external access to replica set nodes
    enabled: false
    
    service:
      # -- Service type: NodePort, LoadBalancer
      type: NodePort
      
      # -- Node ports for each replica (when type=NodePort)
      # Leave empty for auto-assignment
      nodePorts: []
      # - 30017
      # - 30018
      # - 30019
      
      # -- Load balancer IPs (when type=LoadBalancer)
      loadBalancerIPs: []
      
      # -- Annotations for the services
      annotations: {}

  # ---------------------------------------------------------------------------
  # Metrics / Monitoring
  # ---------------------------------------------------------------------------
  metrics:
    # -- Enable Prometheus metrics exporter
    enabled: false
    
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi
    
    serviceMonitor:
      # -- Create ServiceMonitor for Prometheus Operator
      enabled: false
      namespace: ""
      interval: 30s

# -----------------------------------------------------------------------------
# S3 Backup Configuration
# -----------------------------------------------------------------------------
backup:
  # -- Enable automated S3 backups
  enabled: false
  
  # -- Backup schedule (cron format)
  # Default: Daily at 2 AM UTC
  schedule: "0 2 * * *"
  
  # -- Number of backups to retain
  retention: 7

  # -- Container image used by the backup CronJob.
  # Must contain both mongodump (MongoDB Database Tools) and the AWS CLI.
  # Build from deploy/docker/mongodb-backup/ or supply your own image.
  image:
    repository: ghcr.io/yourorg/cp-mongodb-backup
    tag: "7.0"
    pullPolicy: IfNotPresent

  # -- S3 configuration
  s3:
    # -- S3 bucket name (REQUIRED when backup.enabled=true)
    bucket: ""
    
    # -- S3 endpoint (for S3-compatible storage like MinIO)
    # Leave empty for AWS S3
    endpoint: ""
    
    # -- S3 region
    region: "us-east-1"
    
    # -- Path prefix within the bucket
    prefix: "mongodb-backups"
    
    # -- Use existing secret for S3 credentials
    # Must contain keys: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
    existingSecret: ""
    
    # -- S3 credentials (ignored if existingSecret is set)
    accessKeyId: ""
    secretAccessKey: ""

  # -- Resources for backup job
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# -----------------------------------------------------------------------------
# DNS Configuration (MongoDB Atlas-style subdomain)
# -----------------------------------------------------------------------------
dns:
  # -- Enable DNS configuration
  # When enabled, creates records for mongodb+srv:// connection strings
  enabled: false
  
  # -- Cluster subdomain (e.g., "mydb" creates mydb.db.example.com)
  # If empty, uses the release name
  subdomain: ""
  
  # -- Base domain for the cluster (e.g., "db.example.com")
  # This should match dns.db.baseDomain in Control Plane settings
  baseDomain: ""
  
  # -- Replica set name (for SRV TXT record)
  replicaSetName: "rs0"
  
  # -- Include TLS in connection string
  tlsEnabled: false

  # ---------------------------------------------------------------------------
  # Pod Scheduling
  # ---------------------------------------------------------------------------
  # -- Node selector for all pods
  nodeSelector: {}

  # -- Tolerations for all pods
  tolerations: []

  # -- Pod affinity/anti-affinity
  affinity: {}

  # -- Topology spread constraints
  topologySpreadConstraints: []

  # -- Pod disruption budget
  pdb:
    create: true
    minAvailable: 2
    # maxUnavailable: 1

  # ---------------------------------------------------------------------------
  # Network Policy
  # ---------------------------------------------------------------------------
  networkPolicy:
    # -- Enable network policy
    enabled: false
    
    # -- Allow external egress
    allowExternalEgress: true
    
    # -- Additional ingress rules
    extraIngress: []
    
    # -- Additional egress rules
    extraEgress: []

  # ---------------------------------------------------------------------------
  # Service Account
  # ---------------------------------------------------------------------------
  serviceAccount:
    create: true
    name: ""
    annotations: {}

  # ---------------------------------------------------------------------------
  # Init Containers
  # ---------------------------------------------------------------------------
  initContainers: []

  # ---------------------------------------------------------------------------
  # Extra Configuration
  # ---------------------------------------------------------------------------
  # -- Extra MongoDB configuration (mongod.conf)
  # configuration: |
  #   storage:
  #     wiredTiger:
  #       engineConfig:
  #         cacheSizeGB: 2

  # -- Extra environment variables
  extraEnvVars: []

  # -- Extra volumes
  extraVolumes: []

  # -- Extra volume mounts
  extraVolumeMounts: []
