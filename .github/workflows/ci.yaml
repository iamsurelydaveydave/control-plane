# Continuous Integration
# Runs tests, type checks, and linting on every PR and push to main

name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ================================
  # API Tests and Checks
  # ================================
  api:
    name: API - Build & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: control-plane-api

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'
          cache-dependency-path: control-plane-api/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: TypeScript build check
        run: yarn build

      - name: Lint
        run: yarn lint
        continue-on-error: true
