---
# Provision MongoDB Replica Set
# Usage: ansible-playbook playbooks/mongodb-replicaset.yml -i <inventory> -e @vars.yml
#
# Inventory should define groups:
#   [mongodb_primary]
#   primary-host ansible_host=x.x.x.x
#
#   [mongodb_secondary]
#   secondary1 ansible_host=x.x.x.x
#   secondary2 ansible_host=x.x.x.x
#
#   [mongodb_arbiter]  (optional)
#   arbiter ansible_host=x.x.x.x
#
#   [mongodb:children]
#   mongodb_primary
#   mongodb_secondary
#   mongodb_arbiter
#
# Extra vars:
#   mongodb_keyfile_content: (optional) Pre-generated keyfile content for replica set auth.
#                            If not provided, one will be generated on the primary.

# ---------------------------------------------------------------------------
# Phase 1 — Provision all nodes in parallel
# Each node is independent until replica set initialization, so parallel is safe
# ---------------------------------------------------------------------------
- name: Provision MongoDB Replica Set — Nodes
  hosts: mongodb
  become: yes
  gather_facts: yes
  # No serial: runs all nodes in parallel (faster)

  vars:
    mongodb_mode: replicaset
    mongodb_version: "{{ mongodb_version | default('7.0') }}"
    mongodb_port: "{{ mongodb_port | default(27017) }}"
    mongodb_container_name: "{{ mongodb_container_name | default('mongodb') }}"
    mongodb_data_dir: "{{ mongodb_data_dir | default('/opt/mongodb/data') }}"
    mongodb_config_dir: "{{ mongodb_config_dir | default('/opt/mongodb/config') }}"
    mongodb_log_dir: "{{ mongodb_log_dir | default('/opt/mongodb/logs') }}"
    mongodb_keyfile_dir: "{{ mongodb_keyfile_dir | default('/opt/mongodb/keyfile') }}"
    mongodb_replicaset_name: "{{ mongodb_replicaset_name | default('rs0') }}"
    _docker_network: "{{ docker_network | default('cp_databases') }}"

  pre_tasks:
    - name: Validate required variables
      assert:
        that:
          - mongodb_admin_user is defined
          - mongodb_admin_password is defined
          - mongodb_replicaset_name is defined
        fail_msg: "mongodb_admin_user, mongodb_admin_password, and mongodb_replicaset_name must be defined"

    # Use inline ternary to avoid trailing-whitespace from >- block scalar folding
    - name: Set node role based on group membership
      set_fact:
        mongodb_node_role: "{{ 'primary' if inventory_hostname in groups.get('mongodb_primary', []) else 'arbiter' if inventory_hostname in groups.get('mongodb_arbiter', []) else 'secondary' }}"

  roles:
    - role: common
      tags: [common, setup]

    - role: docker
      tags: [docker, setup]

    - role: mongodb
      tags: [mongodb, database]

# ---------------------------------------------------------------------------
# Phase 2 — Initialise the replica set on the primary
#            Runs after ALL nodes are provisioned (not inside serial: 1)
# ---------------------------------------------------------------------------
- name: Provision MongoDB Replica Set — Initialise
  hosts: mongodb_primary
  become: yes
  gather_facts: no
  run_once: true

  vars:
    mongodb_version: "{{ mongodb_version | default('7.0') }}"
    mongodb_port: "{{ mongodb_port | default(27017) }}"
    mongodb_container_name: "{{ mongodb_container_name | default('mongodb') }}"
    mongodb_replicaset_name: "{{ mongodb_replicaset_name | default('rs0') }}"
    mongodb_data_dir: "{{ mongodb_data_dir | default('/opt/mongodb/data') }}"
    mongodb_config_dir: "{{ mongodb_config_dir | default('/opt/mongodb/config') }}"
    mongodb_log_dir: "{{ mongodb_log_dir | default('/opt/mongodb/logs') }}"
    mongodb_keyfile_dir: "{{ mongodb_keyfile_dir | default('/opt/mongodb/keyfile') }}"
    _docker_network: "{{ docker_network | default('cp_databases') }}"

  tasks:
    # -------------------------------------------------------------------------
    # Wait for Docker health checks on ALL nodes CONCURRENTLY
    # Uses async to run health checks in parallel across all nodes
    # -------------------------------------------------------------------------
    - name: Start health check on all nodes (async)
      shell: |
        for i in $(seq 1 60); do
          status=$(docker inspect --format='{{"{{"}}.State.Health.Status{{"}}"}}' {{ mongodb_container_name }} 2>/dev/null || echo "missing")
          if [ "$status" = "healthy" ]; then
            echo "Container healthy after $i checks"
            exit 0
          fi
          echo "Health check $i: $status"
          sleep 5
        done
        echo "Container not healthy after 60 checks (5 minutes)"
        exit 1
      delegate_to: "{{ item }}"
      loop: "{{ groups['mongodb'] }}"
      async: 360  # 6 minute timeout
      poll: 0     # Don't wait, fire and continue
      register: health_check_async

    - name: Wait for all health checks to complete
      async_status:
        jid: "{{ item.ansible_job_id }}"
      delegate_to: "{{ item.item }}"
      loop: "{{ health_check_async.results }}"
      loop_control:
        label: "{{ item.item }}"
      register: health_check
      until: health_check.finished
      retries: 72   # 6 minutes at 5s intervals
      delay: 5

    - name: Debug health check results
      debug:
        msg: "{{ item.stdout_lines[-3:] | default(['(no output)']) }}"
      loop: "{{ health_check.results }}"
      loop_control:
        label: "{{ item.item.item }}"
      when: item.stdout_lines is defined

    # -------------------------------------------------------------------------
    # Test cross-node connectivity CONCURRENTLY
    # -------------------------------------------------------------------------
    - name: Check port connectivity on all nodes (async)
      wait_for:
        host: "{{ hostvars[item]['ansible_host'] }}"
        port: "{{ mongodb_port }}"
        delay: 5
        timeout: 300
      loop: "{{ groups['mongodb'] }}"
      async: 310  # slightly longer than wait_for timeout
      poll: 0
      register: port_check_async

    - name: Wait for all port checks to complete
      async_status:
        jid: "{{ item.ansible_job_id }}"
      loop: "{{ port_check_async.results }}"
      loop_control:
        label: "{{ item.item }}"
      register: port_check
      until: port_check.finished
      retries: 65
      delay: 5

    - name: Debug port check results
      debug:
        msg: "Port {{ mongodb_port }} reachable on {{ hostvars[item.item.item]['ansible_host'] }}"
      loop: "{{ port_check.results }}"
      loop_control:
        label: "{{ item.item.item }}"

    - name: Check if replica set is already initialised
      command: >
        docker exec {{ mongodb_container_name }} mongosh
        --eval "rs.status().ok"
      register: rs_status
      ignore_errors: yes
      changed_when: false

    - name: Initialise replica set
      command: >
        docker exec {{ mongodb_container_name }} mongosh --eval '
        rs.initiate({
          _id: "{{ mongodb_replicaset_name }}",
          members: [
            {% for host in groups["mongodb"] %}
            {
              _id: {{ loop.index0 }},
              host: "{{ hostvars[host]["ansible_host"] }}:{{ mongodb_port }}",
              priority: {% if hostvars[host]["mongodb_node_role"] == "primary" %}10{% elif hostvars[host]["mongodb_node_role"] == "arbiter" %}0{% else %}5{% endif %},
              {% if hostvars[host]["mongodb_node_role"] == "arbiter" %}arbiterOnly: true,{% endif %}
            }{% if not loop.last %},{% endif %}
            {% endfor %}
          ]
        })'
      when: rs_status.rc != 0
      register: rs_init

    - name: Wait for primary election
      command: >
        docker exec {{ mongodb_container_name }} mongosh --eval '
        var status = rs.status();
        while (status.members.filter(m => m.stateStr === "PRIMARY").length === 0) {
          sleep(1000);
          status = rs.status();
        }
        print("PRIMARY elected");
        '
      when: rs_init is changed
      register: rs_wait
      retries: 30
      delay: 5
      until: rs_wait.rc == 0

    # Always try to create admin user - the JS checks if user exists first
    # This ensures user is created even on reprovision where rs_init didn't change
    # Uses w:"majority" to ensure user is replicated before returning
    - name: Create admin user
      command: >-
        docker exec {{ mongodb_container_name }} mongosh admin --eval '
        var adminDb = db.getSiblingDB("admin");
        if (adminDb.getUser("{{ mongodb_admin_user }}") === null) {
          adminDb.createUser({
            user: "{{ mongodb_admin_user }}",
            pwd: "{{ mongodb_admin_password }}",
            roles: [
              { role: "root", db: "admin" },
              { role: "userAdminAnyDatabase", db: "admin" },
              { role: "dbAdminAnyDatabase", db: "admin" },
              { role: "readWriteAnyDatabase", db: "admin" },
              { role: "clusterAdmin", db: "admin" }
            ]
          },
          { w: "majority", wtimeout: 30000 });
          print("Admin user created with majority write concern");
        } else {
          print("Admin user already exists");
        }
        '
      register: admin_user
      retries: 5
      delay: 5
      until: admin_user.rc == 0

    - name: Debug admin user creation result
      debug:
        msg: "{{ admin_user.stdout_lines }}"
      when: admin_user.stdout_lines is defined

    # -------------------------------------------------------------------------
    # Switch ALL nodes to final config with authorization enabled
    # This must be done AFTER admin user is created, BEFORE auth verification
    # Uses async to run operations in parallel across all nodes
    # -------------------------------------------------------------------------
    - name: Check if already using final config with authorization (async)
      shell: |
        docker exec {{ mongodb_container_name }} cat /etc/mongod.conf | grep -q "authorization: enabled" && echo "YES" || echo "NO"
      delegate_to: "{{ item }}"
      loop: "{{ groups['mongodb'] }}"
      async: 60
      poll: 0
      register: config_check_async

    - name: Wait for config checks to complete
      async_status:
        jid: "{{ item.ansible_job_id }}"
      delegate_to: "{{ item.item }}"
      loop: "{{ config_check_async.results }}"
      loop_control:
        label: "{{ item.item }}"
      register: config_check
      until: config_check.finished
      retries: 12
      delay: 5

    - name: Set needs_config_switch fact
      set_fact:
        _needs_config_switch: "{{ config_check.results | selectattr('stdout', 'equalto', 'NO') | list | length > 0 }}"

    - name: Stop MongoDB containers for config switch (async)
      shell: |
        docker stop {{ mongodb_container_name }} || true
        docker rm {{ mongodb_container_name }} || true
      delegate_to: "{{ item }}"
      loop: "{{ groups['mongodb'] }}"
      async: 120
      poll: 0
      register: stop_async
      when: _needs_config_switch | bool

    - name: Wait for containers to stop
      async_status:
        jid: "{{ item.ansible_job_id }}"
      delegate_to: "{{ item.item }}"
      loop: "{{ stop_async.results }}"
      loop_control:
        label: "{{ item.item }}"
      register: stop_result
      until: stop_result.finished
      retries: 24
      delay: 5
      when: _needs_config_switch | bool

    - name: Restart MongoDB containers with final config (async)
      shell: |
        docker run -d \
          --name {{ mongodb_container_name }} \
          --restart unless-stopped \
          -p {{ mongodb_bind_ip | default('0.0.0.0') }}:{{ mongodb_port }}:27017 \
          -v {{ mongodb_data_dir }}:/data/db \
          -v {{ mongodb_config_dir }}/mongod.conf:/etc/mongod.conf:ro \
          -v {{ mongodb_keyfile_dir }}/mongodb-keyfile:/etc/mongodb-keyfile:ro \
          -v {{ mongodb_log_dir }}:/var/log/mongodb \
          --network {{ _docker_network }} \
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'" \
          --health-interval 10s \
          --health-timeout 5s \
          --health-retries 5 \
          --health-start-period 30s \
          mongo:{{ mongodb_version }} mongod --config /etc/mongod.conf
      delegate_to: "{{ item }}"
      loop: "{{ groups['mongodb'] }}"
      async: 120
      poll: 0
      register: restart_async
      when: _needs_config_switch | bool

    - name: Wait for containers to start
      async_status:
        jid: "{{ item.ansible_job_id }}"
      delegate_to: "{{ item.item }}"
      loop: "{{ restart_async.results }}"
      loop_control:
        label: "{{ item.item }}"
      register: restart_result
      until: restart_result.finished
      retries: 24
      delay: 5
      when: _needs_config_switch | bool

    - name: Wait for MongoDB containers to be healthy after config switch (async)
      shell: |
        for i in $(seq 1 36); do
          status=$(docker inspect --format='{{"{{"}}.State.Health.Status{{"}}"}}' {{ mongodb_container_name }} 2>/dev/null || echo "missing")
          if [ "$status" = "healthy" ]; then
            echo "Container healthy after $i checks"
            exit 0
          fi
          echo "Health check $i: $status"
          sleep 5
        done
        echo "Container not healthy after 36 checks (3 minutes)"
        exit 1
      delegate_to: "{{ item }}"
      loop: "{{ groups['mongodb'] }}"
      async: 360
      poll: 0
      register: health_async

    - name: Wait for all health checks to complete after config switch
      async_status:
        jid: "{{ item.ansible_job_id }}"
      delegate_to: "{{ item.item }}"
      loop: "{{ health_async.results }}"
      loop_control:
        label: "{{ item.item }}"
      register: health_result
      until: health_result.finished
      retries: 72
      delay: 5

    # Verify the admin user can actually authenticate
    - name: Verify admin user authentication works
      command: >-
        docker exec {{ mongodb_container_name }} mongosh
        -u "{{ mongodb_admin_user }}" -p "{{ mongodb_admin_password }}"
        --authenticationDatabase admin
        --eval "db.runCommand({ping:1})"
      register: auth_verify
      retries: 10
      delay: 3
      until: auth_verify.rc == 0

  post_tasks:
    - name: Display connection information
      debug:
        msg: |
          MongoDB Replica Set provisioned successfully!

          Replica Set Name: {{ mongodb_replicaset_name }}

          Connection string:
          mongodb://{{ mongodb_admin_user }}:{{ mongodb_admin_password }}@{% for host in groups['mongodb'] %}{{ hostvars[host]['ansible_host'] }}:{{ mongodb_port }}{% if not loop.last %},{% endif %}{% endfor %}/admin?replicaSet={{ mongodb_replicaset_name }}

          Connect with mongosh:
          mongosh "mongodb://{{ hostvars[groups['mongodb_primary'][0]]['ansible_host'] }}:{{ mongodb_port }}" --username {{ mongodb_admin_user }} --authenticationDatabase admin

          NOTE: If you enable TLS later with mongodb-configure-tls.yml, add these params:
          &tls=true&tlsAllowInvalidCertificates=true
      run_once: true
