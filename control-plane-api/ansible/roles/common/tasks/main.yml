---
# Common role - basic server setup

# Clean up broken Docker apt sources from partial provisioning runs
- name: Remove broken Docker apt sources (pre-cleanup)
  shell: |
    rm -f /etc/apt/sources.list.d/docker.list
    rm -f /etc/apt/sources.list.d/docker.sources
    rm -f /etc/apt/sources.list.d/download_docker_com_linux_ubuntu.list
    rm -f /etc/apt/sources.list.d/download_docker_com_linux_ubuntu.sources
    apt-key del 0EBFCD88 2>/dev/null || true
    apt-key del 7EA0A9C3F273FCD8 2>/dev/null || true
    apt-key del 8D81803C0EBFCD88 2>/dev/null || true
  args:
    executable: /bin/bash
  changed_when: false
  ignore_errors: yes
  when: ansible_os_family == "Debian"

- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600
  when: ansible_os_family == "Debian"

- name: Install common packages
  apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
      - python3-pip
      - software-properties-common
      - ufw
    state: present
  when: ansible_os_family == "Debian"

- name: Set timezone
  timezone:
    name: "{{ timezone | default('UTC') }}"

- name: Configure UFW defaults
  ufw:
    direction: "{{ item.direction }}"
    policy: "{{ item.policy }}"
  loop:
    - { direction: incoming, policy: deny }
    - { direction: outgoing, policy: allow }

- name: Allow SSH
  ufw:
    rule: allow
    port: "{{ ansible_port | default(22) }}"
    proto: tcp

- name: Enable UFW
  ufw:
    state: enabled
