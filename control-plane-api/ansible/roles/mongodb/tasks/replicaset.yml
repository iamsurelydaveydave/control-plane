---
# MongoDB Replica Set deployment
# This task file is run on each replica set member

- name: Create MongoDB data directory
  file:
    path: "{{ mongodb_data_dir }}"
    state: directory
    mode: '0755'
    owner: "999"
    group: "999"

- name: Create MongoDB config directory
  file:
    path: "{{ mongodb_config_dir }}"
    state: directory
    mode: '0755'

- name: Create MongoDB log directory
  file:
    path: "{{ mongodb_log_dir }}"
    state: directory
    mode: '0755'
    owner: "999"
    group: "999"

- name: Create MongoDB keyfile directory
  file:
    path: "{{ mongodb_keyfile_dir }}"
    state: directory
    mode: '0700'
    owner: "999"
    group: "999"

- name: Generate keyfile content (on primary only)
  shell: openssl rand -base64 756
  register: keyfile_content
  run_once: true
  delegate_to: "{{ groups['mongodb_primary'][0] }}"
  when: mongodb_node_role == "primary"

- name: Set keyfile fact
  set_fact:
    mongodb_keyfile_content: "{{ hostvars[groups['mongodb_primary'][0]]['keyfile_content']['stdout'] }}"
  when: keyfile_content is defined or hostvars[groups['mongodb_primary'][0]]['keyfile_content'] is defined

- name: Copy keyfile to all nodes
  copy:
    content: "{{ mongodb_keyfile_content }}"
    dest: "{{ mongodb_keyfile_dir }}/mongodb-keyfile"
    mode: '0400'
    owner: "999"
    group: "999"

- name: Template MongoDB replica set configuration
  template:
    src: mongod-replicaset.conf.j2
    dest: "{{ mongodb_config_dir }}/mongod.conf"
    mode: '0644'
  notify: Restart MongoDB

- name: Allow MongoDB port in UFW
  ufw:
    rule: allow
    port: "{{ mongodb_port }}"
    proto: tcp
    from_ip: "{{ item }}"
  loop: "{{ mongodb_allowed_ips | default(['any']) }}"

- name: Pull MongoDB Docker image
  docker_image:
    name: "mongo:{{ mongodb_version }}"
    source: pull

- name: Run MongoDB container
  docker_container:
    name: "{{ mongodb_container_name }}"
    image: "mongo:{{ mongodb_version }}"
    state: started
    restart_policy: unless-stopped
    ports:
      - "{{ mongodb_bind_ip | default('0.0.0.0') }}:{{ mongodb_port }}:27017"
    volumes:
      - "{{ mongodb_data_dir }}:/data/db"
      - "{{ mongodb_config_dir }}/mongod.conf:/etc/mongod.conf:ro"
      - "{{ mongodb_keyfile_dir }}/mongodb-keyfile:/etc/mongodb-keyfile:ro"
      - "{{ mongodb_log_dir }}:/var/log/mongodb"
    command: ["mongod", "--config", "/etc/mongod.conf"]
    networks:
      - name: "{{ docker_network | default('cp_databases') }}"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

- name: Wait for MongoDB to be ready
  wait_for:
    host: "127.0.0.1"
    port: "{{ mongodb_port }}"
    delay: 5
    timeout: 60

# Initialize replica set (run only on primary)
- name: Initialize replica set
  include_tasks: init-replicaset.yml
  when: mongodb_node_role == "primary"
