networks:
  control-plane:
    name: control-plane
    driver: bridge

volumes:
  control-plane-ssh:
    name: control-plane-ssh
  control-plane-logs:
    name: control-plane-logs
  control-plane-backups:
    name: control-plane-backups
  control-plane-redis:
    name: control-plane-redis
  control-plane-caddy-data:
    name: control-plane-caddy-data
  control-plane-caddy-config:
    name: control-plane-caddy-config
