# MongoDB Replica Set with External Access
# =========================================
#
# 3-node replica set exposed via NodePort for external client access.
# Use when apps outside the cluster need to connect.
#
# Usage:
#   helm install external-mongodb ./mongodb-replicaset \
#     -f examples/external-access.yaml \
#     --namespace databases --create-namespace \
#     --set mongodb.auth.rootPassword=$(openssl rand -base64 24)

mongodb:
  architecture: replicaset
  replicaCount: 3
  replicaSetName: rs0

  auth:
    enabled: true
    # Set via --set
    # rootPassword: ""

  # TLS recommended for external access
  tls:
    enabled: true
    autoGenerated: true

  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 4Gi

  persistence:
    enabled: true
    size: 50Gi

  # Enable external access
  externalAccess:
    enabled: true
    service:
      type: NodePort
      # Optionally specify fixed node ports
      # nodePorts:
      #   - 30017
      #   - 30018
      #   - 30019
      annotations: {}

  # Alternatively, use LoadBalancer (e.g., on cloud providers)
  # externalAccess:
  #   enabled: true
  #   service:
  #     type: LoadBalancer
  #     loadBalancerIPs: []
  #     annotations:
  #       # For AWS NLB
  #       service.beta.kubernetes.io/aws-load-balancer-type: "nlb"

  pdb:
    create: true
    minAvailable: 2

  metrics:
    enabled: true

controlPlane:
  labels:
    access: external
