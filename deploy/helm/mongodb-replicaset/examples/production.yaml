# Production MongoDB Replica Set
# ==============================
#
# 3-node replica set with TLS, monitoring, and proper resource limits.
#
# Usage:
#   helm install prod-mongodb ./mongodb-replicaset \
#     -f examples/production.yaml \
#     --namespace databases --create-namespace \
#     --set mongodb.auth.rootPassword=$(openssl rand -base64 24)

mongodb:
  architecture: replicaset
  replicaCount: 3
  replicaSetName: rs0

  # Authentication
  auth:
    enabled: true
    # Set via --set or use existingSecret
    # rootPassword: ""
    # existingSecret: mongodb-credentials

  # TLS - required for production
  tls:
    enabled: true
    autoGenerated: true

  # Production resources
  resources:
    requests:
      cpu: 1000m
      memory: 2Gi
    limits:
      cpu: 4000m
      memory: 8Gi

  # Storage - adjust size based on data volume
  persistence:
    enabled: true
    storageClass: ""  # Use cluster default or specify SSD class
    size: 100Gi

  # High availability
  pdb:
    create: true
    minAvailable: 2

  # Monitoring
  metrics:
    enabled: true
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi
    serviceMonitor:
      enabled: true
      interval: 30s

  # Pod anti-affinity - spread across nodes
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app.kubernetes.io/component: mongodb
            topologyKey: kubernetes.io/hostname

  # Topology spread - distribute across zones
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          app.kubernetes.io/component: mongodb

  # Network policy - restrict access
  networkPolicy:
    enabled: true
    allowExternalEgress: false

# Control Plane labels
controlPlane:
  labels:
    environment: production
    tier: database
