---
# Convert MongoDB Standalone to Replica Set
# This playbook:
# 1. Stops the existing standalone MongoDB
# 2. Reconfigures it with keyfile auth and replica set settings
# 3. Restarts as a replica set primary
# 4. Provisions the new secondary/arbiter node
# 5. Initializes the replica set
#
# Inventory should define:
#   [mongodb_primary]    - The existing standalone node (becomes primary)
#   [mongodb_secondary]  - New secondary node(s)
#   [mongodb_arbiter]    - New arbiter node(s) (optional)

- name: Convert Standalone to Replica Set - Phase 1 (Primary Setup)
  hosts: mongodb_primary
  become: yes
  gather_facts: yes
  
  vars:
    mongodb_mode: replicaset
    mongodb_version: "{{ mongodb_version | default('7.0') }}"
    mongodb_port: "{{ mongodb_port | default(27017) }}"
    mongodb_container_name: "{{ mongodb_container_name | default('mongodb') }}"
    mongodb_data_dir: "{{ mongodb_data_dir | default('/opt/mongodb/data') }}"
    mongodb_config_dir: "{{ mongodb_config_dir | default('/opt/mongodb/config') }}"
    mongodb_log_dir: "{{ mongodb_log_dir | default('/opt/mongodb/logs') }}"
    mongodb_keyfile_dir: "{{ mongodb_keyfile_dir | default('/opt/mongodb/keyfile') }}"
    mongodb_replicaset_name: "{{ mongodb_replicaset_name | default('rs0') }}"
    docker_network: "{{ docker_network | default('cp_databases') }}"
  
  tasks:
    - name: Validate required variables
      assert:
        that:
          - mongodb_admin_user is defined
          - mongodb_admin_password is defined
          - mongodb_replicaset_name is defined
          - mongodb_keyfile_content is defined
        fail_msg: "mongodb_admin_user, mongodb_admin_password, mongodb_replicaset_name, and mongodb_keyfile_content must be defined"

    - name: Stop existing standalone MongoDB container
      docker_container:
        name: "{{ mongodb_container_name }}"
        state: stopped

    - name: Create MongoDB keyfile directory
      file:
        path: "{{ mongodb_keyfile_dir }}"
        state: directory
        mode: '0700'
        owner: "999"
        group: "999"

    - name: Write keyfile from provided content
      copy:
        content: "{{ mongodb_keyfile_content }}"
        dest: "{{ mongodb_keyfile_dir }}/mongodb-keyfile"
        mode: '0400'
        owner: "999"
        group: "999"

    - name: Template MongoDB replica set configuration
      template:
        src: ../roles/mongodb/templates/mongod-replicaset.conf.j2
        dest: "{{ mongodb_config_dir }}/mongod.conf"
        mode: '0644'

    - name: Start MongoDB with replica set configuration
      docker_container:
        name: "{{ mongodb_container_name }}"
        image: "mongo:{{ mongodb_version }}"
        state: started
        restart_policy: unless-stopped
        ports:
          - "{{ mongodb_bind_ip | default('0.0.0.0') }}:{{ mongodb_port }}:27017"
        volumes:
          - "{{ mongodb_data_dir }}:/data/db"
          - "{{ mongodb_config_dir }}/mongod.conf:/etc/mongod.conf:ro"
          - "{{ mongodb_keyfile_dir }}/mongodb-keyfile:/etc/mongodb-keyfile:ro"
          - "{{ mongodb_log_dir }}:/var/log/mongodb"
        command: ["mongod", "--config", "/etc/mongod.conf"]
        networks:
          - name: "{{ docker_network | default('cp_databases') }}"
        healthcheck:
          test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
          interval: 10s
          timeout: 5s
          retries: 5
          start_period: 30s

    - name: Wait for MongoDB to be ready
      wait_for:
        host: "127.0.0.1"
        port: "{{ mongodb_port }}"
        delay: 5
        timeout: 60

- name: Convert Standalone to Replica Set - Phase 2 (Secondary Setup)
  hosts: mongodb_secondary:mongodb_arbiter
  become: yes
  gather_facts: yes
  serial: 1
  
  vars:
    mongodb_mode: replicaset
    mongodb_version: "{{ mongodb_version | default('7.0') }}"
    mongodb_port: "{{ mongodb_port | default(27017) }}"
    mongodb_container_name: "{{ mongodb_container_name | default('mongodb') }}"
    mongodb_data_dir: "{{ mongodb_data_dir | default('/opt/mongodb/data') }}"
    mongodb_config_dir: "{{ mongodb_config_dir | default('/opt/mongodb/config') }}"
    mongodb_log_dir: "{{ mongodb_log_dir | default('/opt/mongodb/logs') }}"
    mongodb_keyfile_dir: "{{ mongodb_keyfile_dir | default('/opt/mongodb/keyfile') }}"
    mongodb_replicaset_name: "{{ mongodb_replicaset_name | default('rs0') }}"
    docker_network: "{{ docker_network | default('cp_databases') }}"
  
  pre_tasks:
    - name: Set node role based on group membership
      set_fact:
        mongodb_node_role: >-
          {% if inventory_hostname in groups.get('mongodb_arbiter', []) %}arbiter
          {% else %}secondary{% endif %}
  
  roles:
    - role: common
      tags: [common, setup]
    
    - role: docker
      tags: [docker, setup]

  tasks:
    - name: Create MongoDB data directory
      file:
        path: "{{ mongodb_data_dir }}"
        state: directory
        mode: '0755'
        owner: "999"
        group: "999"

    - name: Create MongoDB config directory
      file:
        path: "{{ mongodb_config_dir }}"
        state: directory
        mode: '0755'

    - name: Create MongoDB log directory
      file:
        path: "{{ mongodb_log_dir }}"
        state: directory
        mode: '0755'
        owner: "999"
        group: "999"

    - name: Create MongoDB keyfile directory
      file:
        path: "{{ mongodb_keyfile_dir }}"
        state: directory
        mode: '0700'
        owner: "999"
        group: "999"

    - name: Copy keyfile from provided content
      copy:
        content: "{{ mongodb_keyfile_content }}"
        dest: "{{ mongodb_keyfile_dir }}/mongodb-keyfile"
        mode: '0400'
        owner: "999"
        group: "999"

    - name: Template MongoDB replica set configuration
      template:
        src: ../roles/mongodb/templates/mongod-replicaset.conf.j2
        dest: "{{ mongodb_config_dir }}/mongod.conf"
        mode: '0644'

    - name: Allow MongoDB port in UFW
      ufw:
        rule: allow
        port: "{{ mongodb_port }}"
        proto: tcp
        from_ip: "{{ item }}"
      loop: "{{ mongodb_allowed_ips | default(['any']) }}"

    - name: Pull MongoDB Docker image
      docker_image:
        name: "mongo:{{ mongodb_version }}"
        source: pull

    - name: Run MongoDB container
      docker_container:
        name: "{{ mongodb_container_name }}"
        image: "mongo:{{ mongodb_version }}"
        state: started
        restart_policy: unless-stopped
        ports:
          - "{{ mongodb_bind_ip | default('0.0.0.0') }}:{{ mongodb_port }}:27017"
        volumes:
          - "{{ mongodb_data_dir }}:/data/db"
          - "{{ mongodb_config_dir }}/mongod.conf:/etc/mongod.conf:ro"
          - "{{ mongodb_keyfile_dir }}/mongodb-keyfile:/etc/mongodb-keyfile:ro"
          - "{{ mongodb_log_dir }}:/var/log/mongodb"
        command: ["mongod", "--config", "/etc/mongod.conf"]
        networks:
          - name: "{{ docker_network | default('cp_databases') }}"
        healthcheck:
          test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
          interval: 10s
          timeout: 5s
          retries: 5
          start_period: 30s

    - name: Wait for MongoDB to be ready
      wait_for:
        host: "127.0.0.1"
        port: "{{ mongodb_port }}"
        delay: 5
        timeout: 60

- name: Convert Standalone to Replica Set - Phase 3 (Initialize)
  hosts: mongodb_primary
  become: yes
  gather_facts: no
  
  vars:
    mongodb_port: "{{ mongodb_port | default(27017) }}"
    mongodb_container_name: "{{ mongodb_container_name | default('mongodb') }}"
    mongodb_replicaset_name: "{{ mongodb_replicaset_name | default('rs0') }}"
  
  tasks:
    - name: Wait for all nodes to be reachable
      wait_for:
        host: "{{ hostvars[item]['ansible_host'] }}"
        port: "{{ mongodb_port }}"
        timeout: 120
      loop: "{{ groups['mongodb_primary'] + groups.get('mongodb_secondary', []) + groups.get('mongodb_arbiter', []) }}"

    - name: Initialize replica set
      command: >
        docker exec {{ mongodb_container_name }} mongosh --eval '
        rs.initiate({
          _id: "{{ mongodb_replicaset_name }}",
          members: [
            {% set all_hosts = groups["mongodb_primary"] + groups.get("mongodb_secondary", []) + groups.get("mongodb_arbiter", []) %}
            {% for host in all_hosts %}
            {
              _id: {{ loop.index0 }},
              host: "{{ hostvars[host]["ansible_host"] }}:{{ mongodb_port }}",
              priority: {% if host in groups["mongodb_primary"] %}10{% elif host in groups.get("mongodb_arbiter", []) %}0{% else %}5{% endif %},
              {% if host in groups.get("mongodb_arbiter", []) %}arbiterOnly: true{% endif %}
            }{% if not loop.last %},{% endif %}
            {% endfor %}
          ]
        })'
      register: rs_init

    - name: Wait for replica set to elect primary
      command: >
        docker exec {{ mongodb_container_name }} mongosh --eval '
        var status = rs.status();
        while (status.members.filter(m => m.stateStr === "PRIMARY").length === 0) {
          sleep(1000);
          status = rs.status();
        }
        print("PRIMARY elected");
        '
      register: rs_wait
      retries: 30
      delay: 5
      until: rs_wait.rc == 0

    - name: Display replica set status
      command: >
        docker exec {{ mongodb_container_name }} mongosh 
        --username "{{ mongodb_admin_user }}"
        --password "{{ mongodb_admin_password }}"
        --authenticationDatabase admin
        --eval "rs.status()"
      register: rs_status_output

    - name: Show status
      debug:
        var: rs_status_output.stdout_lines

    - name: Display connection information
      debug:
        msg: |
          MongoDB Replica Set initialized successfully!
          
          Replica Set Name: {{ mongodb_replicaset_name }}
          
          Connection string:
          mongodb://{{ mongodb_admin_user }}:{{ mongodb_admin_password }}@{% set all_hosts = groups["mongodb_primary"] + groups.get("mongodb_secondary", []) + groups.get("mongodb_arbiter", []) %}{% for host in all_hosts %}{{ hostvars[host]["ansible_host"] }}:{{ mongodb_port }}{% if not loop.last %},{% endif %}{% endfor %}/admin?replicaSet={{ mongodb_replicaset_name }}
