apiVersion: skaffold/v4beta11
kind: Config
metadata:
  name: control-plane

# ──────────────────────────────────────────────────────────────────────────────
# Build — default: docker build + push to GHCR (CI/CD and manual releases)
#
# Requires: docker login ghcr.io (GITHUB_TOKEN or PAT with packages:write)
# Tag policy: git commit SHA so every build is reproducible and traceable.
# Both images are built in parallel (concurrency: 2).
# ──────────────────────────────────────────────────────────────────────────────
build:
  artifacts:
    - image: ghcr.io/iamsurelydaveydave/control-plane-api
      context: control-plane-api
      docker:
        dockerfile: Dockerfile

    - image: ghcr.io/iamsurelydaveydave/control-plane-web
      context: control-plane-web
      docker:
        dockerfile: Dockerfile

  tagPolicy:
    gitCommit: {}       # tag = short git SHA; dirty tree appends -dirty

  local:
    push: true
    concurrency: 2      # build both images in parallel

# ──────────────────────────────────────────────────────────────────────────────
# Deploy — default: `helm upgrade --install` into the control-plane namespace.
#
# Required before running:
#   cp deploy/skaffold-values.yaml.example deploy/skaffold-values.yaml
#   # fill in mongodb URI, jwt secret, and ingress host
# ──────────────────────────────────────────────────────────────────────────────
deploy:
  helm:
    releases:
      - name: control-plane
        chartPath: deploy/helm/control-plane
        namespace: control-plane
        createNamespace: true
        valuesFiles:
          - deploy/helm/control-plane/values.yaml
          - deploy/skaffold-values.yaml          # secrets — gitignored
        # Skaffold v4: use setValueTemplates to inject built image refs
        # Template vars are auto-generated from artifact image names:
        #   ghcr.io/iamsurelydaveydave/control-plane-api → IMAGE_*_ghcr_io_iamsurelydaveydave_control_plane_api
        setValueTemplates:
          api.image.repository: "{{.IMAGE_REPO_ghcr_io_iamsurelydaveydave_control_plane_api}}"
          api.image.tag: "{{.IMAGE_TAG_ghcr_io_iamsurelydaveydave_control_plane_api}}"
          web.image.repository: "{{.IMAGE_REPO_ghcr_io_iamsurelydaveydave_control_plane_web}}"
          web.image.tag: "{{.IMAGE_TAG_ghcr_io_iamsurelydaveydave_control_plane_web}}"

# ──────────────────────────────────────────────────────────────────────────────
# Profiles
# ──────────────────────────────────────────────────────────────────────────────
profiles:
  # k3s ─────────────────────────────────────────────────────────────────────
  # Build images with nerdctl directly into K3s's containerd — no Docker daemon,
  # no registry, no import step. Images land in the k8s.io namespace and are
  # immediately available to kubelet.
  #
  # Prerequisites on the server:
  #   - nerdctl-full (includes BuildKit)
  #   - buildkitd running against /run/k3s/containerd/containerd.sock
  #
  # Usage:
  #   skaffold run -p k3s               # one-shot: build + deploy
  #   skaffold dev  -p k3s              # watch: rebuild + redeploy on file changes
  #   KUBECONFIG=/etc/rancher/k3s/k3s.yaml skaffold run -p k3s
  # ─────────────────────────────────────────────────────────────────────────
  - name: k3s
    build:
      artifacts:
        - image: ghcr.io/iamsurelydaveydave/control-plane-api
          context: control-plane-api
          custom:
            buildCommand: |
              nerdctl \
                --address /run/k3s/containerd/containerd.sock \
                --namespace k8s.io \
                build -t "$IMAGE" -f Dockerfile .
            dependencies:
              paths:
                - "**"
              ignore:
                - "node_modules/**"
                - "dist/**"
                - ".git/**"

        - image: ghcr.io/iamsurelydaveydave/control-plane-web
          context: control-plane-web
          custom:
            buildCommand: |
              nerdctl \
                --address /run/k3s/containerd/containerd.sock \
                --namespace k8s.io \
                build -t "$IMAGE" -f Dockerfile .
            dependencies:
              paths:
                - "**"
              ignore:
                - "node_modules/**"
                - ".nuxt/**"
                - ".output/**"
                - ".git/**"

      tagPolicy:
        sha256: {}      # content-based tag — stable across re-runs if source unchanged

      local:
        push: false     # never push — images stay local in K3s containerd
        tryImportMissing: false  # don't check remote registry for cached images
        concurrency: 1  # build sequentially to avoid OOM on small servers

    deploy:
      helm:
        releases:
          - name: control-plane
            chartPath: deploy/helm/control-plane
            namespace: control-plane
            createNamespace: true
            valuesFiles:
              - deploy/helm/control-plane/values.yaml
              - deploy/helm/control-plane/values.dev.yaml
              - deploy/skaffold-values.yaml
            setValues:
              api.image.pullPolicy: Never   # use locally built image; never pull
              web.image.pullPolicy: Never
            setValueTemplates:
              api.image.repository: "{{.IMAGE_REPO_ghcr_io_iamsurelydaveydave_control_plane_api}}"
              api.image.tag: "{{.IMAGE_TAG_ghcr_io_iamsurelydaveydave_control_plane_api}}"
              web.image.repository: "{{.IMAGE_REPO_ghcr_io_iamsurelydaveydave_control_plane_web}}"
              web.image.tag: "{{.IMAGE_TAG_ghcr_io_iamsurelydaveydave_control_plane_web}}"
