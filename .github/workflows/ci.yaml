# Continuous Integration
# Runs tests, type checks, and linting on every PR and push to main

name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ================================
  # API Tests and Checks
  # ================================
  api:
    name: API - Build & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: control-plane-api

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'
          cache-dependency-path: control-plane-api/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: TypeScript build check
        run: yarn build

      - name: Lint
        run: yarn lint
        continue-on-error: true

  # ================================
  # Web Tests and Checks
  # ================================
  web:
    name: Web - Build & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: control-plane-web

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.13.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: control-plane-web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint
        continue-on-error: true

      - name: Build
        run: pnpm build
        env:
          NUXT_PUBLIC_API_BASE_URL: http://localhost:5005/api
