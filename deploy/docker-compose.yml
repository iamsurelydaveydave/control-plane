# Control Plane - Docker Compose
# Production deployment with external MongoDB and Redis

services:
  # ================================
  # Control Plane API
  # ================================
  control-plane-api:
    image: ${REGISTRY_URL:-ghcr.io}/iamsurelydaveydave/control-plane-api:${VERSION:-latest}
    container_name: control-plane-api
    restart: unless-stopped
    networks:
      - control-plane
    environment:
      - NODE_ENV=production
      - PORT=5005
      - MONGODB_URI=${MONGODB_URI}
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET=${JWT_SECRET}
      - SESSION_SECRET=${SESSION_SECRET}
      - COOKIE_DOMAIN=${COOKIE_DOMAIN:-}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-}
      - ROOT_USERNAME=${ROOT_USERNAME:-}
      - ROOT_USER_EMAIL=${ROOT_USER_EMAIL:-}
      - ROOT_USER_PASSWORD=${ROOT_USER_PASSWORD:-}
      # Caddy integration
      - CADDY_ADMIN_URL=http://control-plane-proxy:2019
      - CADDY_ENABLED=${CADDY_ENABLED:-true}
    volumes:
      - control-plane-ssh:/data/control-plane/ssh
      - control-plane-logs:/data/control-plane/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5005/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ================================
  # Control Plane Web (Nuxt)
  # ================================
  control-plane-web:
    image: ${REGISTRY_URL:-ghcr.io}/iamsurelydaveydave/control-plane-web:${VERSION:-latest}
    container_name: control-plane-web
    restart: unless-stopped
    networks:
      - control-plane
    environment:
      - NODE_ENV=production
      - NUXT_HOST=0.0.0.0
      - NUXT_PORT=3000
      - API_URL=http://control-plane-api:5005
      - COOKIE_DOMAIN=${COOKIE_DOMAIN:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      control-plane-api:
        condition: service_healthy

  # ================================
  # Caddy (Reverse Proxy + Auto SSL + Dynamic Routing)
  # ================================
  control-plane-proxy:
    image: caddy:2-alpine
    container_name: control-plane-proxy
    restart: unless-stopped
    networks:
      - control-plane
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - control-plane-caddy-data:/data
      - control-plane-caddy-config:/config
    # Expose admin API on internal network only (not to host)
    # API listens on 0.0.0.0:2019 inside container
    depends_on:
      - control-plane-web
      - control-plane-api

networks:
  control-plane:
    name: control-plane
    driver: bridge

volumes:
  control-plane-ssh:
    name: control-plane-ssh
  control-plane-logs:
    name: control-plane-logs
  control-plane-caddy-data:
    name: control-plane-caddy-data
  control-plane-caddy-config:
    name: control-plane-caddy-config
