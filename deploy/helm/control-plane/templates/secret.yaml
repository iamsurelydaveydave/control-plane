{{- if or (not .Values.api.mongodb.existingSecret) (not .Values.api.jwt.existingSecret) (and (not .Values.redis.enabled) .Values.api.redis.password (not .Values.api.redis.existingSecret)) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "control-plane.api.secretName" . }}
  labels:
    {{- include "control-plane.api.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if not .Values.api.mongodb.existingSecret }}
  {{- if .Values.api.mongodb.uri }}
  mongodb-uri: {{ .Values.api.mongodb.uri | b64enc | quote }}
  {{- else }}
  # WARNING: MongoDB URI is required. Set api.mongodb.uri or api.mongodb.existingSecret
  mongodb-uri: {{ "" | b64enc | quote }}
  {{- end }}
  {{- end }}
  
  {{- if not .Values.api.jwt.existingSecret }}
  {{- if .Values.api.jwt.secret }}
  jwt-secret: {{ .Values.api.jwt.secret | b64enc | quote }}
  {{- else }}
  # Auto-generate JWT secret if not provided
  jwt-secret: {{ randAlphaNum 64 | b64enc | quote }}
  {{- end }}
  {{- end }}
  
  {{- if and (not .Values.redis.enabled) .Values.api.redis.password (not .Values.api.redis.existingSecret) }}
  redis-password: {{ .Values.api.redis.password | b64enc | quote }}
  {{- end }}
{{- end }}
