---
# =============================================================================
# Dashboard ConfigMap for Grafana
#
# This makes the dashboard available to Grafana when using the
# dashboardsConfigMaps feature in kube-prometheus-stack.
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: control-plane-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"  # Label for Grafana sidecar to pick up
data:
  control-plane-dashboard.json: |
    # Content from control-plane-dashboard.json goes here
    # In production, use kustomize or helm to template this
    # See: deploy/monitoring/control-plane-dashboard.json
