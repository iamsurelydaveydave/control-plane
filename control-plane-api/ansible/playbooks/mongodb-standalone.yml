---
# Provision MongoDB Standalone
# Usage: ansible-playbook playbooks/mongodb-standalone.yml -i <inventory> -e @vars.yml
- name: Provision MongoDB Standalone
  hosts: mongodb
  become: yes
  gather_facts: yes
  
  vars:
    mongodb_mode: standalone
    mongodb_version: "{{ mongodb_version | default('7.0') }}"
    mongodb_port: "{{ mongodb_port | default(27017) }}"
    mongodb_container_name: "{{ mongodb_container_name | default('mongodb') }}"
    mongodb_data_dir: "{{ mongodb_data_dir | default('/opt/mongodb/data') }}"
    mongodb_config_dir: "{{ mongodb_config_dir | default('/opt/mongodb/config') }}"
    mongodb_log_dir: "{{ mongodb_log_dir | default('/opt/mongodb/logs') }}"
    docker_network: "{{ docker_network | default('cp_databases') }}"
  
  pre_tasks:
    - name: Validate required variables
      assert:
        that:
          - mongodb_admin_user is defined
          - mongodb_admin_password is defined
        fail_msg: "mongodb_admin_user and mongodb_admin_password must be defined"

  roles:
    - role: common
      tags: [common, setup]
    
    - role: docker
      tags: [docker, setup]
    
    - role: mongodb
      tags: [mongodb, database]

  post_tasks:
    - name: Display connection information
      debug:
        msg: |
          MongoDB provisioned successfully!
          
          Connection string:
          mongodb://{{ mongodb_admin_user }}:{{ mongodb_admin_password }}@{{ ansible_host }}:{{ mongodb_port }}/admin
          
          Connect with mongosh:
          mongosh "mongodb://{{ ansible_host }}:{{ mongodb_port }}" --username {{ mongodb_admin_user }} --authenticationDatabase admin
