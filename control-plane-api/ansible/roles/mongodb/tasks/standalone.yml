---
# MongoDB Standalone deployment
- name: Create MongoDB data directory
  file:
    path: "{{ mongodb_data_dir }}"
    state: directory
    mode: '0755'
    owner: "999"  # MongoDB container user
    group: "999"

- name: Create MongoDB config directory
  file:
    path: "{{ mongodb_config_dir }}"
    state: directory
    mode: '0755'

- name: Create MongoDB log directory
  file:
    path: "{{ mongodb_log_dir }}"
    state: directory
    mode: '0755'
    owner: "999"
    group: "999"

- name: Template MongoDB configuration
  template:
    src: mongod.conf.j2
    dest: "{{ mongodb_config_dir }}/mongod.conf"
    mode: '0644'
  notify: Restart MongoDB

- name: Template MongoDB init script
  template:
    src: init-mongo.js.j2
    dest: "{{ mongodb_config_dir }}/init-mongo.js"
    mode: '0644'
  when: mongodb_init_db | default(false)

- name: Allow MongoDB port in UFW
  ufw:
    rule: allow
    port: "{{ mongodb_port }}"
    proto: tcp
    from_ip: "{{ item }}"
  loop: "{{ mongodb_allowed_ips | default(['any']) }}"

- name: Pull MongoDB Docker image
  docker_image:
    name: "mongo:{{ mongodb_version }}"
    source: pull

- name: Run MongoDB container
  docker_container:
    name: "{{ mongodb_container_name }}"
    image: "mongo:{{ mongodb_version }}"
    state: started
    restart_policy: unless-stopped
    ports:
      - "{{ mongodb_bind_ip | default('0.0.0.0') }}:{{ mongodb_port }}:27017"
    volumes:
      - "{{ mongodb_data_dir }}:/data/db"
      - "{{ mongodb_config_dir }}/mongod.conf:/etc/mongod.conf:ro"
      - "{{ mongodb_log_dir }}:/var/log/mongodb"
    env:
      MONGO_INITDB_ROOT_USERNAME: "{{ mongodb_admin_user }}"
      MONGO_INITDB_ROOT_PASSWORD: "{{ mongodb_admin_password }}"
      MONGO_INITDB_DATABASE: "{{ mongodb_init_database | default('admin') }}"
    command: ["mongod", "--config", "/etc/mongod.conf"]
    networks:
      - name: "{{ docker_network | default('cp_databases') }}"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

- name: Wait for MongoDB to be ready
  wait_for:
    host: "{{ mongodb_bind_ip | default('127.0.0.1') }}"
    port: "{{ mongodb_port }}"
    delay: 5
    timeout: 60

- name: Wait for MongoDB to accept connections
  command: >
    docker exec {{ mongodb_container_name }} mongosh 
    --username "{{ mongodb_admin_user }}" 
    --password "{{ mongodb_admin_password }}" 
    --authenticationDatabase admin 
    --eval "db.adminCommand('ping')"
  register: mongodb_ping
  retries: 10
  delay: 5
  until: mongodb_ping.rc == 0
  changed_when: false
