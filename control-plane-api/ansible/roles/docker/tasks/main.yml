---
# Docker role - install Docker CE using modern approach
- name: Remove old Docker versions
  apt:
    name:
      - docker
      - docker-engine
      - docker.io
      - containerd
      - runc
    state: absent
  when: ansible_os_family == "Debian"

- name: Install prerequisites
  apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: yes
  when: ansible_os_family == "Debian"

- name: Create keyrings directory
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'
  when: ansible_os_family == "Debian"

- name: Remove conflicting Docker repository files
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/apt/sources.list.d/docker.list
    - /etc/apt/sources.list.d/docker.sources
    - /etc/apt/sources.list.d/download_docker_com_linux_ubuntu.list
    - /etc/apt/sources.list.d/download_docker_com_linux_ubuntu.sources
    - /etc/apt/sources.list.d/archive_ubuntu_com_ubuntu.sources
  when: ansible_os_family == "Debian"

- name: Remove legacy Docker GPG key from apt-key keyring
  shell: |
    apt-key del 0EBFCD88 2>/dev/null || true
    apt-key del 7EA0A9C3F273FCD8 2>/dev/null || true
  changed_when: false
  when: ansible_os_family == "Debian"

- name: Download Docker GPG key
  get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'
    force: yes
  when: ansible_os_family == "Debian"

- name: Get system architecture
  command: dpkg --print-architecture
  register: dpkg_arch
  changed_when: false
  when: ansible_os_family == "Debian"

- name: Add Docker repository
  copy:
    dest: /etc/apt/sources.list.d/docker.list
    content: "deb [arch={{ dpkg_arch.stdout }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    mode: '0644'
  when: ansible_os_family == "Debian"

- name: Update apt cache after adding Docker repo
  apt:
    update_cache: yes
  when: ansible_os_family == "Debian"

- name: Install Docker CE
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
  when: ansible_os_family == "Debian"

- name: Start and enable Docker service
  systemd:
    name: docker
    state: started
    enabled: yes

- name: Add user to docker group
  user:
    name: "{{ ansible_user }}"
    groups: docker
    append: yes

- name: Install Docker SDK for Python
  apt:
    name: python3-docker
    state: present
  when: ansible_os_family == "Debian"

- name: Create Docker network for databases
  docker_network:
    name: "{{ _docker_network | default('cp_databases') }}"
    state: present
