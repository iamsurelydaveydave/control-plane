{{- if and .Values.ingress.enabled (not .Values.ingressRoute.enabled) }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "control-plane.fullname" . }}
  labels:
    {{- include "control-plane.labels" . | nindent 4 }}
  annotations:
    {{- if and .Values.ingress.tls.enabled .Values.ingress.tls.issuer }}
    cert-manager.io/cluster-issuer: {{ .Values.ingress.tls.issuer | quote }}
    {{- end }}
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host | quote }}
      secretName: {{ include "control-plane.tls.secretName" . }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          # API routes - must come first for specificity
          - path: {{ .Values.ingress.paths.api }}
            pathType: Prefix
            backend:
              service:
                name: {{ include "control-plane.api.fullname" . }}
                port:
                  number: {{ .Values.api.service.port }}
          # Web routes - catch all remaining traffic
          - path: {{ .Values.ingress.paths.web }}
            pathType: Prefix
            backend:
              service:
                name: {{ include "control-plane.web.fullname" . }}
                port:
                  number: {{ .Values.web.service.port }}
{{- end }}

---
{{- if .Values.ingressRoute.enabled }}
# Traefik IngressRoute CRD (alternative to standard Ingress)
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "control-plane.fullname" . }}
  labels:
    {{- include "control-plane.labels" . | nindent 4 }}
spec:
  entryPoints:
    {{- toYaml .Values.ingressRoute.entryPoints | nindent 4 }}
  routes:
    # API routes
    - match: Host(`{{ .Values.ingress.host }}`) && PathPrefix(`{{ .Values.ingress.paths.api }}`)
      kind: Rule
      services:
        - name: {{ include "control-plane.api.fullname" . }}
          port: {{ .Values.api.service.port }}
      {{- if .Values.ingressRoute.middlewares }}
      middlewares:
        {{- toYaml .Values.ingressRoute.middlewares | nindent 8 }}
      {{- end }}
    # Web routes (catch-all)
    - match: Host(`{{ .Values.ingress.host }}`)
      kind: Rule
      services:
        - name: {{ include "control-plane.web.fullname" . }}
          port: {{ .Values.web.service.port }}
      {{- if .Values.ingressRoute.middlewares }}
      middlewares:
        {{- toYaml .Values.ingressRoute.middlewares | nindent 8 }}
      {{- end }}
  {{- if .Values.ingressRoute.tls.enabled }}
  tls:
    {{- if .Values.ingressRoute.tls.secretName }}
    secretName: {{ .Values.ingressRoute.tls.secretName }}
    {{- else if .Values.ingressRoute.tls.certResolver }}
    certResolver: {{ .Values.ingressRoute.tls.certResolver }}
    {{- else }}
    secretName: {{ include "control-plane.tls.secretName" . }}
    {{- end }}
  {{- end }}
{{- end }}
