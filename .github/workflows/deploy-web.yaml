name: Deploy Web to Cloudflare

on:
  push:
    branches:
      - main
      - staging
      - develop
    paths:
      - 'control-plane-web/**'
      - '.github/workflows/deploy-web.yaml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'development'
        type: choice
        options:
          - development
          - staging
          - production

env:
  PNPM_VERSION: 11.13.1

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('control-plane-web/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Determine environment
        id: env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "environment=production" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" = "refs/heads/staging" ]; then
            echo "environment=staging" >> $GITHUB_OUTPUT
          else
            echo "environment=development" >> $GITHUB_OUTPUT
          fi

      - name: Set environment variables
        id: vars
        run: |
          ENV="${{ steps.env.outputs.environment }}"
          case "$ENV" in
            production)
              echo "api_url=${{ vars.API_URL_PRODUCTION }}" >> $GITHUB_OUTPUT
              echo "cookie_domain=${{ vars.COOKIE_DOMAIN_PRODUCTION }}" >> $GITHUB_OUTPUT
              ;;
            staging)
              echo "api_url=${{ vars.API_URL_STAGING }}" >> $GITHUB_OUTPUT
              echo "cookie_domain=${{ vars.COOKIE_DOMAIN_STAGING }}" >> $GITHUB_OUTPUT
              ;;
            *)
              echo "api_url=${{ vars.API_URL_DEVELOPMENT }}" >> $GITHUB_OUTPUT
              echo "cookie_domain=${{ vars.COOKIE_DOMAIN_DEVELOPMENT }}" >> $GITHUB_OUTPUT
              ;;
          esac

      - name: Install dependencies
        working-directory: control-plane-web
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: control-plane-web
        env:
          NODE_ENV: production
          API_URL: ${{ steps.vars.outputs.api_url }}
          COOKIE_DOMAIN: ${{ steps.vars.outputs.cookie_domain }}
        run: pnpm build

      # Remove wrangler.json if it exists (generated by Nitro) to avoid conflicts
      - name: Clean up generated config
        working-directory: control-plane-web
        run: |
          rm -f wrangler.json
          rm -rf .wrangler/deploy

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          workingDirectory: control-plane-web
          command: deploy --env ${{ steps.env.outputs.environment }}
